<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a0a00" />
    <meta name="description" content="Adam's Restaurant & JuiceBar - Fine Dining & Fresh Juices Since 2018" />
    <title>Adam's Restaurant & JuiceBar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --gold-dark: #8b6914;
        --cream: #fdf8f0;
        --dark: #0e0600;
        --dark2: #1a0e04;
        --dark3: #2a1a08;
        --text: #3d2b10;
        --text-light: #7a6040;
        --font-serif: 'Cormorant Garamond', Georgia, serif;
        --font-sans: 'Jost', sans-serif;
      }
      html { scroll-behavior: smooth; }
      body { background: var(--dark); color: var(--cream); font-family: var(--font-sans); overflow-x: hidden; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--dark2); }
      ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
